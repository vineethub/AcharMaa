name: Achar maa

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  nuxt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Run lint (optional)
        run: npm run lint || true